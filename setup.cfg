[isort]
# PEP 8: stdlib → third party → local application; blank line between groups.
profile = black
line_length = 79
src_paths =
    ya_news
    ya_note
known_first_party =
    news
    notes
sections =
    FUTURE,
    STDLIB,
    THIRDPARTY,
    FIRSTPARTY,
    LOCALFOLDER
skip_glob =
    */migrations/*
    */venv/*
    */.venv/*
    */env/*

[flake8]
max-line-lenght = 79
max-complexity = 10
ignore =
    W503,
    F811,
    D100, D101, D102, D103, D104, D105, D106, D107,
    D203, D204, D205, D213,
    D400, D401,
    N806, N818
exclude =
    */migrations/
    venv/
    env/
    .venv/
per-file-ignores =
  settings.py:E501
